name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  webui-js:
    name: webui-js
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install JS test dependencies
        working-directory: webui
        run: npm ci --include=dev

      - name: Run pure JS tests
        working-directory: webui
        run: node --test tests-js/*.test.js

  webui-python-smoke:
    name: webui-python-smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: webui/requirements.txt

      - name: Python syntax smoke check
        run: python -m compileall analyze webui/webui
